<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rate Your Experience</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f1f3f4;font-family:'Google Sans',Roboto,Arial,sans-serif}
body{display:flex;align-items:flex-start;justify-content:center;padding:0;min-height:100vh}
.sheet{width:100%;max-width:420px;background:#fff;min-height:100vh}
.topbar{background:#1a73e8;padding:14px 16px 12px;display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn svg{width:20px;height:20px;fill:#fff}
.topbar-title{font-size:18px;font-weight:500;color:#fff}
.place-header{padding:16px;display:flex;gap:12px;align-items:center;border-bottom:1px solid #e8eaed}
.place-icon{width:48px;height:48px;border-radius:8px;background:#e8f0fe;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.place-icon svg{width:28px;height:28px;fill:#1a73e8}
.place-name{font-size:16px;font-weight:500;color:#202124;margin-bottom:2px}
.place-type{font-size:13px;color:#5f6368}
.section-label{padding:16px 16px 8px;font-size:13px;color:#5f6368}
.stars-wrap{padding:4px 16px 16px;border-bottom:1px solid #e8eaed}
.stars-row{display:flex;gap:4px}
.star-btn{width:48px;height:48px;border:none;background:transparent;cursor:pointer;padding:0;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:transform .1s;-webkit-tap-highlight-color:transparent}
.star-btn:active{transform:scale(.88)}
.star-btn svg{width:38px;height:38px}
.star-btn svg .outline{fill:#dadce0}
.star-btn svg .filled{fill:#fbbc04;display:none}
.star-btn.lit svg .outline{display:none}
.star-btn.lit svg .filled{display:block}
.star-label{margin-top:6px;font-size:13px;color:#5f6368;height:18px}
.review-section{padding:16px;border-bottom:1px solid #e8eaed;display:none}
.review-section.show{display:block}
.review-section textarea{width:100%;min-height:120px;border:1px solid #dadce0;border-radius:4px;padding:12px;font-size:15px;font-family:inherit;color:#202124;resize:none;outline:none;line-height:1.5;transition:border-color .15s}
.review-section textarea:focus{border-color:#1a73e8;border-width:2px;padding:11px}
.review-section textarea::placeholder{color:#80868b}
.char-count{text-align:right;font-size:12px;color:#80868b;margin-top:4px}
.name-row{margin-top:10px}
.name-row input{width:100%;border:1px solid #dadce0;border-radius:4px;padding:11px 12px;font-size:15px;font-family:inherit;color:#202124;outline:none;transition:border-color .15s}
.name-row input:focus{border-color:#1a73e8;border-width:2px;padding:10px 11px}
.name-row input::placeholder{color:#80868b}
.submit-bar{padding:12px 16px;border-top:1px solid #e8eaed;display:none;gap:8px;align-items:center;justify-content:flex-end}
.submit-bar.show{display:flex}
.btn-cancel{padding:9px 16px;border:none;background:transparent;font-size:14px;font-weight:500;color:#5f6368;font-family:inherit;cursor:pointer;border-radius:4px}
.btn-cancel:hover{background:#f1f3f4}
.btn-post{padding:9px 20px;border:none;background:#1a73e8;color:#fff;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;border-radius:4px;opacity:.5;pointer-events:none;transition:background .12s}
.btn-post.ready{opacity:1;pointer-events:auto}
.btn-post:active{background:#1557b0}
.thankyou-high{display:none;padding:28px 20px}
.thankyou-high.show{display:block}
.g-box{border:1px solid #dadce0;border-radius:8px;padding:20px;text-align:center}
.g-logo{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px}
.g-logo svg{width:22px;height:22px}
.g-logo span{font-size:18px;font-weight:500;color:#202124}
.g-box p{font-size:14px;color:#5f6368;line-height:1.5;margin-bottom:16px}
.g-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 16px;background:#1a73e8;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color:transparent}
.g-btn:active{background:#1557b0}
.g-btn svg{width:18px;height:18px;fill:#fff;flex-shrink:0}
.skip-link{display:block;text-align:center;margin-top:12px;font-size:13px;color:#1a73e8;cursor:pointer}
.thankyou-low{display:none;padding:32px 24px;text-align:center}
.thankyou-low.show{display:block}
.ty-check{width:56px;height:56px;border-radius:50%;background:#e6f4ea;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.ty-check svg{width:32px;height:32px;fill:#137333}
.ty-title{font-size:18px;font-weight:500;color:#202124;margin-bottom:8px}
.ty-sub{font-size:14px;color:#5f6368;line-height:1.5}

/* missing config warning */
.cfg-warn{margin:24px 16px;background:#fce8e6;border:1px solid #f5c6c2;border-radius:8px;padding:16px}
.cfg-warn h3{font-size:14px;font-weight:600;color:#b71c1c;margin-bottom:6px}
.cfg-warn p{font-size:13px;color:#c62828;line-height:1.5}
.cfg-warn code{background:#fdecea;padding:2px 6px;border-radius:4px;font-size:12px;display:block;margin-top:6px;word-break:break-all;color:#b71c1c}
</style>
</head>
<body>
<div class="sheet">

  <div class="topbar">
    <button class="back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <span class="topbar-title">Rate &amp; review</span>
  </div>

  <div id="main-content">
    <div class="place-header">
      <div class="place-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div>
        <div class="place-name" id="biz-name"></div>
        <div class="place-type" id="biz-type"></div>
      </div>
    </div>

    <div class="section-label">Select your rating</div>
    <div class="stars-wrap">
      <div class="stars-row" id="stars-row"></div>
      <div class="star-label" id="star-label">&nbsp;</div>
    </div>

    <div class="review-section" id="review-section">
      <textarea id="review-text" placeholder="Share details of your experience at this place" maxlength="4096"></textarea>
      <div class="char-count" id="char-count">0 / 4096</div>
      <div class="name-row">
        <input type="text" id="reviewer-name" placeholder="Your name (optional)">
      </div>
    </div>

    <div class="submit-bar" id="submit-bar">
      <button class="btn-cancel" onclick="resetForm()">Cancel</button>
      <button class="btn-post" id="btn-post" onclick="submitReview()">Post</button>
    </div>

    <div class="thankyou-high" id="ty-high">
      <div class="g-box">
        <div class="g-logo">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.83z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.83c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
          <span>Google</span>
        </div>
        <p>Thank you! We're glad you had a great experience. Would you share it on Google so others can find us?</p>
        <a class="g-btn" href="#" onclick="goGoogle(event)">
          <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
          Post on Google Reviews
        </a>
        <span class="skip-link" onclick="skipGoogle()">No thanks, I'm done</span>
      </div>
    </div>

    <div class="thankyou-low" id="ty-low">
      <div class="ty-check">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      </div>
      <div class="ty-title">Thank you for your feedback</div>
      <div class="ty-sub">We appreciate you letting us know. We'll work on doing better.</div>
    </div>
  </div>

</div>
<script>
/* ═══════════════════════════════════════════════════════════
   ALL CONFIG COMES FROM URL PARAMS — no editing needed ever.

   QR code URL format:
   https://harjeet-001.github.io/feedback-automation/?biz=NAME&type=TYPE&email=EMAIL&google=GOOGLE_URL

   Example:
   https://harjeet-001.github.io/feedback-automation/?biz=Raj's Bakery&type=Bakery & Cafe&email=raj@bakery.com&google=https://search.google.com/local/writereview?placeid=ABC123
   ═══════════════════════════════════════════════════════════ */

const p             = new URLSearchParams(window.location.search);
const BUSINESS_NAME = p.get('biz')    || '';
const BUSINESS_TYPE = p.get('type')   || '';
const OWNER_EMAIL   = p.get('email')  || '';
const GOOGLE_URL    = p.get('google') || '';

/* show warning if params missing */
if(!BUSINESS_NAME || !OWNER_EMAIL){
  document.getElementById('main-content').innerHTML = `
    <div class="cfg-warn">
      <h3>⚠️ Missing setup parameters</h3>
      <p>This page needs URL parameters to work. Use this format for your QR code:</p>
      <code>https://harjeet-001.github.io/feedback-automation/?biz=Business Name&type=Restaurant&email=owner@email.com&google=GOOGLE_REVIEW_URL</code>
    </div>`;
} else {
  document.getElementById('biz-name').textContent = BUSINESS_NAME;
  document.getElementById('biz-type').textContent = BUSINESS_TYPE || 'Local Business';
}

const LABELS = ['','Terrible','Poor','Average','Good','Excellent'];
let rating = 0;

const row = document.getElementById('stars-row');
if(row){
  for(let i = 1; i <= 5; i++){
    const b = document.createElement('button');
    b.className = 'star-btn';
    b.setAttribute('aria-label', i + ' star' + (i > 1 ? 's' : ''));
    b.dataset.v = i;
    b.innerHTML = `<svg viewBox="0 0 24 24">
      <path class="outline" d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zm-10 6.11l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 3.99 4.38.38-3.32 2.88 1 4.28L12 15.35z"/>
      <path class="filled" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
    </svg>`;
    b.addEventListener('click', () => rate(i));
    row.appendChild(b);
  }
}

function rate(v){
  rating = v;
  document.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('lit', i < v));
  document.getElementById('star-label').textContent = LABELS[v];
  document.getElementById('review-section').classList.add('show');
  document.getElementById('submit-bar').classList.add('show');
  checkReady();
  setTimeout(() => document.getElementById('review-text').focus(), 200);
}

const ta = document.getElementById('review-text');
if(ta) ta.addEventListener('input', () => {
  document.getElementById('char-count').textContent = ta.value.length + ' / 4096';
  checkReady();
});

function checkReady(){
  document.getElementById('btn-post').classList.toggle('ready', ta && ta.value.trim().length > 0);
}

function submitReview(){
  const msg  = ta.value.trim();
  if(!msg) return;
  const name  = document.getElementById('reviewer-name').value.trim() || 'Anonymous';
  const stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
  const subj  = encodeURIComponent('[Customer Feedback] ' + stars + ' — ' + BUSINESS_NAME);
  const body  = encodeURIComponent('Rating: ' + stars + ' (' + rating + '/5)\nFrom: ' + name + '\n\nFeedback:\n' + msg + '\n\n— Sent via review form');
  window.location.href = 'mailto:' + OWNER_EMAIL + '?subject=' + subj + '&body=' + body;
  document.getElementById('review-section').classList.remove('show');
  document.getElementById('submit-bar').classList.remove('show');
  setTimeout(() => {
    if(rating >= 4) document.getElementById('ty-high').classList.add('show');
    else            document.getElementById('ty-low').classList.add('show');
  }, 400);
}

function goGoogle(e){
  e.preventDefault();
  if(GOOGLE_URL) window.location.href = GOOGLE_URL;
}

function skipGoogle(){
  const box = document.getElementById('ty-high');
  box.innerHTML = '<p style="text-align:center;padding:32px 0;font-size:15px;color:#5f6368">Thanks for visiting! See you again soon. 😊</p>';
}

function resetForm(){
  rating = 0;
  if(ta) ta.value = '';
  const n = document.getElementById('reviewer-name');
  if(n) n.value = '';
  document.getElementById('char-count').textContent = '0 / 4096';
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('lit'));
  document.getElementById('star-label').innerHTML = '&nbsp;';
  document.getElementById('review-section').classList.remove('show');
  document.getElementById('submit-bar').classList.remove('show');
}
</script>
</body>
</html>
